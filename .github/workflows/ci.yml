name: CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck nosleep install.sh

  smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test (no sudo paths)
        run: |
          chmod +x nosleep
          ./nosleep help
          ./nosleep version | grep -E '^nosleep [0-9]+\.[0-9]+\.[0-9]+$'
          ./nosleep status
          if ./nosleep bogus 2>/dev/null; then
            echo "invalid arg should exit non-zero" >&2
            exit 1
          fi
          ./nosleep help | grep -q clean
          if out=$(./nosleep clean </dev/null 2>&1); then
            echo "clean without whitelist should exit non-zero" >&2
            exit 1
          fi
          echo "$out" | grep -q "nosleep whitelist"
          if ./nosleep whitelist </dev/null 2>/dev/null; then
            echo "whitelist without a tty should exit non-zero" >&2
            exit 1
          fi
          if ./nosleep off clean </dev/null 2>/dev/null; then
            echo "clean+off should be rejected" >&2
            exit 1
          fi
